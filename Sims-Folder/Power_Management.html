<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Source Drag & Drop</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f8f4e4; }
    h2 { text-align: center; font-weight: bold; color: #333; margin-top: 20px; }
    .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; padding: 0 10px; box-sizing: border-box; }
    .column { flex: 1 1 220px; max-width: 260px; width: 100%; box-sizing: border-box; padding: 10px; background-color: #d7c3a3; border-radius: 10px; }
    .column h3 { text-align: center; font-size: 18px; color: #333; margin-bottom: 15px; }
    .column select { width: 100%; padding: 5px; margin-bottom: 10px; font-size: 14px; min-height: 40px; box-sizing: border-box; }
    .item { padding: 10px; margin: 5px 0; background-color: #fff; border: 1px solid #ccc; border-radius: 5px; cursor: grab; text-align: center; min-height: 20px; touch-action: none; user-select: none; }
    .dropzone { border: 1px dashed #aaa; padding: 10px; margin: 10px 0; min-height: 40px; background-color: #fff; display: flex; align-items: center; justify-content: center; }
    .incorrect { color: red; }
    #results { margin-top: 20px; font-weight: bold; text-align: center; color: #333; }
    button { padding: 10px 20px; min-height: 40px; background-color: #2f8f4d; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    button:hover { background-color: #256b3a; }

    @media (max-width: 600px) {
      h2 { font-size: 20px; margin-top: 12px; }
      h3 { font-size: 15px; }
      .container { gap: 12px; margin-top: 12px; }
      .column { padding: 8px; }
    }
  </style>
</head>
<body>
  <h2>Drag & Drop Power Source Exercise</h2>
<div style="text-align:center; margin-top: 10px;">
  <h3>Select the correct power source from the drop downs, then drag and drop the devices to the correct power source!</h3>
</div>
  <div class="container">
    <div class="column">
      <h3>Wall Outlet</h3>
      <div id="wallOutlet1" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="wallOutlet2" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="wallOutlet3" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="wallOutlet4" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="wallOutlet5" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="wallOutlet6" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <div class="column">
      <h3>Surge Protector</h3>
      <select id="surgeSource">
        <option>--Select Power Source--</option>
        <option>Surge Protector</option>
        <option>UPS</option>
        <option>Wall Outlet</option>
      </select>
      <div id="surgeProtector1" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="surgeProtector2" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="surgeProtector3" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="surgeProtector4" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="surgeProtector5" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="surgeProtector6" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <div class="column">
      <h3>UPS</h3>
      <select id="upsSource">
        <option>--Select Power Source--</option>
        <option>Surge Protector</option>
        <option>Wall Outlet</option>
        <option>UPS</option>
      </select>
      <div id="ups1" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="ups2" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="ups3" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="ups4" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="ups5" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div id="ups6" class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
    <div class="column">
      <h3>Drag & Drop Devices</h3>
      <div id="choices">
        <div class="item" draggable="true" ondragstart="drag(event)" id="Cable Modem">Cable Modem</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Computer">Computer</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Monitor">Monitor</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Printer">Printer</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Scanner">Scanner</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Wi-Fi Router">Wi-Fi Router</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Fan">Fan</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Lamp">Lamp</div>
        <div class="item" draggable="true" ondragstart="drag(event)" id="Clock/Radio">Clock/Radio</div>
      </div>
    </div>
  </div>
  <div style="text-align:center; margin-top:20px;">
    <button onclick="submitAnswers()">Submit</button>
    <button onclick="resetGame()">Reset</button>
  </div>
  <div id="results"></div>

  <script>
    function allowDrop(ev) {
      ev.preventDefault();
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      performDrop(ev.target, data);
    }

    // Shared drop logic used by both the HTML5 drag-and-drop handler
    // above and the touch-based drag handler below.
    function performDrop(targetZone, elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;
      if (!targetZone.contains(element)) {
        targetZone.appendChild(element);
        element.classList.remove("incorrect");
      }
    }

    // --- Touch support (HTML5 drag-and-drop does not work on mobile touch) ---
    let touchDragEl = null;
    let touchOffsetX = 0;
    let touchOffsetY = 0;

    function initTouchDrag(item) {
      item.addEventListener("touchstart", function (ev) {
        touchDragEl = item;
        const touch = ev.touches[0];
        const rect = item.getBoundingClientRect();
        touchOffsetX = touch.clientX - rect.left;
        touchOffsetY = touch.clientY - rect.top;
        item.style.position = "fixed";
        item.style.zIndex = "1000";
        item.style.width = rect.width + "px";
        item.style.left = rect.left + "px";
        item.style.top = rect.top + "px";
        item.style.pointerEvents = "none";
      }, { passive: true });

      item.addEventListener("touchmove", function (ev) {
        if (!touchDragEl) return;
        ev.preventDefault();
        const touch = ev.touches[0];
        touchDragEl.style.left = (touch.clientX - touchOffsetX) + "px";
        touchDragEl.style.top = (touch.clientY - touchOffsetY) + "px";
      }, { passive: false });

      item.addEventListener("touchend", function (ev) {
        if (!touchDragEl) return;
        const touch = ev.changedTouches[0];
        const dragged = touchDragEl;
        dragged.style.pointerEvents = "";
        dragged.style.position = "";
        dragged.style.zIndex = "";
        dragged.style.width = "";
        dragged.style.left = "";
        dragged.style.top = "";

        const dropEl = document.elementFromPoint(touch.clientX, touch.clientY);
        const zone = dropEl ? dropEl.closest(".dropzone") : null;
        if (zone) {
          performDrop(zone, dragged.id);
        }
        touchDragEl = null;
      });
    }

    function initAllTouchDrag() {
      document.querySelectorAll(".item").forEach(initTouchDrag);
    }

    function submitAnswers() {
      const correctWallDevices = ["Fan", "Lamp", "Clock/Radio"];
      const correctSurgeDevices = ["Printer", "Scanner"];
      const correctUPSDevices = ["Cable Modem", "Computer", "Monitor", "Wi-Fi Router"];
      const surgeSource = document.getElementById("surgeSource").value;
      const upsSource = document.getElementById("upsSource").value;

      let score = 0;
      let total = 11;

      // Check dropdowns
      if (surgeSource === "Wall Outlet") {
        score++;
        document.getElementById("surgeSource").classList.remove("incorrect");
      } else {
        document.getElementById("surgeSource").classList.add("incorrect");
      }

      if (upsSource === "Surge Protector") {
        score++;
        document.getElementById("upsSource").classList.remove("incorrect");
      } else {
        document.getElementById("upsSource").classList.add("incorrect");
      }

      // Evaluate Wall Outlet
      let wallItems = [];
      for (let i = 1; i <= 6; i++) {
        const item = document.getElementById(`wallOutlet${i}`).firstElementChild;
        if (item) wallItems.push(item);
      }

      wallItems.forEach(el => {
        if (correctWallDevices.includes(el.id)) {
          el.classList.remove("incorrect");
          score++;
        } else {
          el.classList.add("incorrect");
        }
      });

      // Evaluate Surge Protector
      let surgeItems = [];
      for (let i = 1; i <= 6; i++) {
        const item = document.getElementById(`surgeProtector${i}`).firstElementChild;
        if (item) surgeItems.push(item);
      }

      surgeItems.forEach(el => {
        if (correctSurgeDevices.includes(el.id)) {
          el.classList.remove("incorrect");
          score++;
        } else {
          el.classList.add("incorrect");
        }
      });

      // Evaluate UPS
      let upsItems = [];
      for (let i = 1; i <= 6; i++) {
        const item = document.getElementById(`ups${i}`).firstElementChild;
        if (item) upsItems.push(item);
      }

      upsItems.forEach(el => {
        if (correctUPSDevices.includes(el.id)) {
          el.classList.remove("incorrect");
          score++;
        } else {
          el.classList.add("incorrect");
        }
      });

      document.getElementById("results").innerText = `Score: ${score}/${total}`;
    }

    function shuffleDevices() {
      const devices = document.querySelectorAll(".item");
      const devicesArray = Array.from(devices);
      const shuffledDevices = shuffleArray(devicesArray);

      const choicesContainer = document.getElementById("choices");
      choicesContainer.innerHTML = ""; // Clear the existing devices

      shuffledDevices.forEach(device => {
        choicesContainer.appendChild(device);
      });
    }

    function shuffleDropdownOptions(dropdownId) {
      const dropdown = document.getElementById(dropdownId);
      const optionsArray = Array.from(dropdown.options);
      
      // Remove the "--Select Power Source--" option before shuffling
      const selectOption = optionsArray.find(option => option.text === "--Select Power Source--");
      optionsArray.splice(optionsArray.indexOf(selectOption), 1);
      
      const shuffledOptions = shuffleArray(optionsArray);

      dropdown.innerHTML = ""; // Clear existing options
      // Add the "--Select Power Source--" back to the top
      dropdown.appendChild(selectOption);
      
      shuffledOptions.forEach(option => dropdown.appendChild(option));
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]; // Swap elements
      }
      return array;
    }

    function resetGame() {
      shuffleDevices();
      shuffleDropdownOptions("surgeSource");
      shuffleDropdownOptions("upsSource");
      document.getElementById("results").innerText = "";
      const dropzones = document.querySelectorAll(".dropzone");
      dropzones.forEach(zone => {
        zone.innerHTML = ""; // Clear the dropzones
      });
      document.getElementById("surgeSource").selectedIndex = 0;
      document.getElementById("upsSource").selectedIndex = 0;
    }

    // Shuffle devices and dropdown options on page load
    window.onload = function() {
      shuffleDevices();
      shuffleDropdownOptions("surgeSource");
      shuffleDropdownOptions("upsSource");
      initAllTouchDrag();
    };
  </script>
</body>
</html>
