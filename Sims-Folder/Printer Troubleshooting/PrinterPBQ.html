<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printer Component Drag-and-Drop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f0f0f0;
    }
    h2 {
      text-align: center;
    }
    .diagram-scroll {
      overflow-x: auto;
      max-width: 100%;
      margin: 20px 0;
      -webkit-overflow-scrolling: touch;
    }
    #diagram {
      position: relative;
      background-image: url("printer.png");
      background-size: contain;
      background-repeat: no-repeat;
      width: 800px;
      height: 500px;
      min-width: 800px;
      margin: 0 auto;
      border: 2px solid #333;
    }
    .dropzone {
      position: absolute;
      width: 120px;
      height: 30px;
      border: 2px dashed #ccc;
      text-align: center;
      line-height: 30px;
      font-weight: bold;
      color: #333;
      background-color: rgba(255,255,255,0.8);
    }
    .draggable {
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      margin: 5px;
      border-radius: 5px;
      cursor: move;
      display: inline-block;
      touch-action: none;
    }
    button {
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
    }
    #labels {
      text-align: center;
      margin-bottom: 20px;
    }
    #result {
      margin-top: 20px;
      font-size: 16px;
      background: white;
      padding: 15px;
      border-radius: 5px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .correct {
      border-color: green;
      background-color: rgba(0, 255, 0, 0.2);
    }
    .incorrect {
      border-color: red;
      background-color: rgba(255, 0, 0, 0.2);
    }

    @media (max-width: 600px) {
      body { padding: 12px; }
      #result { padding: 12px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <h7>This is a LASER printer. Drag and drop the correct componets where they belong in the image. Use reset if you need to try again.  
  <h2>Label the Printer Components</h2>
  <div id="labels">
    <div class="draggable" draggable="true" id="Toner">Toner</div>
    <div class="draggable" draggable="true" id="Fuser">Fuser</div>
    <div class="draggable" draggable="true" id="Rollers">Rollers</div>
    <div class="draggable" draggable="true" id="Duplexer">Duplexer</div>
    <div class="draggable" draggable="true" id="Ink Cartridge">Ink Cartridge</div>
  </div>

  <div class="diagram-scroll">
    <div id="diagram">
      <div class="dropzone" id="zone1" style="top: 67px; left: 240px;"></div>
      <div class="dropzone" id="zone2" style="top: 215px; left: 240px;"></div>
      <div class="dropzone" id="zone3" style="top: 271px; left: 50px;"></div>
      <div class="dropzone" id="zone4" style="top: 385px; left: 50px;"></div>
    </div>
  </div>

  <div style="text-align:center;">
    <button onclick="checkAnswers()">Submit</button>
    <button onclick="resetActivity()">Reset</button>
  </div>
  <div id="result"></div>

  <script>
    const draggables = document.querySelectorAll('.draggable');
    const dropzones = document.querySelectorAll('.dropzone');
    const labelContainer = document.getElementById('labels');

    function dropElementInZone(zone, element) {
      if (!zone || !element) return;

      if (zone.children.length > 0) {
        labelContainer.appendChild(zone.firstChild);
      }

      zone.innerHTML = '';
      zone.appendChild(element);
    }

    draggables.forEach(draggable => {
      draggable.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', draggable.id);
      });
    });

    dropzones.forEach(zone => {
      zone.addEventListener('dragover', e => {
        e.preventDefault();
      });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        const data = e.dataTransfer.getData('text/plain');
        const element = document.getElementById(data);
        dropElementInZone(zone, element);
      });
    });

    /* Touch (mobile) support: native HTML5 drag-and-drop does not fire on
       touch devices, so re-implement dragging using touch events + the
       shared dropElementInZone() logic used by the desktop 'drop' handler. */
    let touchDragEl = null;
    let touchDragOffsetX = 0;
    let touchDragOffsetY = 0;
    let touchDragOriginParent = null;
    let touchDragOriginNextSibling = null;

    draggables.forEach(draggable => {
      draggable.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        touchDragEl = draggable;
        touchDragOriginParent = draggable.parentElement;
        touchDragOriginNextSibling = draggable.nextSibling;

        const rect = draggable.getBoundingClientRect();
        touchDragOffsetX = touch.clientX - rect.left;
        touchDragOffsetY = touch.clientY - rect.top;

        draggable.style.position = 'fixed';
        draggable.style.zIndex = '1000';
        draggable.style.width = rect.width + 'px';
        draggable.style.left = rect.left + 'px';
        draggable.style.top = rect.top + 'px';
      }, { passive: false });

      draggable.addEventListener('touchmove', e => {
        if (!touchDragEl) return;
        e.preventDefault();
        const touch = e.touches[0];
        touchDragEl.style.left = (touch.clientX - touchDragOffsetX) + 'px';
        touchDragEl.style.top = (touch.clientY - touchDragOffsetY) + 'px';
      }, { passive: false });

      draggable.addEventListener('touchend', e => {
        if (!touchDragEl) return;
        const touch = e.changedTouches[0];
        const el = touchDragEl;

        el.style.pointerEvents = 'none';
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        el.style.pointerEvents = '';

        el.style.position = '';
        el.style.zIndex = '';
        el.style.width = '';
        el.style.left = '';
        el.style.top = '';

        const zone = target ? target.closest('.dropzone') : null;
        if (zone) {
          dropElementInZone(zone, el);
        } else if (touchDragOriginNextSibling) {
          touchDragOriginParent.insertBefore(el, touchDragOriginNextSibling);
        } else {
          touchDragOriginParent.appendChild(el);
        }

        touchDragEl = null;
        touchDragOriginParent = null;
        touchDragOriginNextSibling = null;
      });
    });

    function checkAnswers() {
      const correctAnswers = {
        "zone1": "Toner",
        "zone2": "Fuser",
        "zone3": "Rollers",
        "zone4": "Duplexer",
      };

      let resultText = "<strong>Results:</strong><br><ul>";
      dropzones.forEach(zone => {
        zone.classList.remove("correct", "incorrect");

        const droppedItem = zone.firstChild ? zone.firstChild.id : "";
        const correctItem = correctAnswers[zone.id];

        if (droppedItem === correctItem) {
          zone.classList.add("correct");
          resultText += `<li><strong>${droppedItem}:</strong> ✅ Correct</li>`;
        } else if (droppedItem) {
          zone.classList.add("incorrect");
          resultText += `<li><strong>${droppedItem}:</strong> ❌ Incorrect</li>`;
        }
      });
      resultText += "</ul>";
      document.getElementById("result").innerHTML = resultText;
    }

    function resetActivity() {
      dropzones.forEach(zone => {
        if (zone.children.length > 0) {
          labelContainer.appendChild(zone.firstChild);
        }
        zone.classList.remove("correct", "incorrect");
        zone.innerHTML = '';
      });
      document.getElementById("result").innerHTML = '';
    }
  </script>
</body>
</html>
