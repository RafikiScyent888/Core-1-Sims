<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAID Troubleshooting Challenge</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f5;
      padding: 20px;
      text-align: center;
    }
    h2 { color: #2a4d69; }
    .instructions { color: #555; margin-bottom: 20px; }

    #layout-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    #spare-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 220px;
      width: 100%;
      justify-content: center;
    }
    #server-scroll {
      max-width: 100%;
      overflow-x: auto;
    }
    .drive {
      width: 160px;
      background: linear-gradient(to bottom, #d8dadc, #a9abad);
      border: 2px solid #888;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      color: #222;
      cursor: pointer;
      position: relative;
      touch-action: none;
    }
    .drive span {
      display: block;
      line-height: 1.2;
      text-align: center;
    }
    .remove-btn {
      position: absolute;
      top: 0;
      right: 0;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: red;
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #server-container {
      position: relative;
      width: 600px;
      min-width: 600px;
      height: 600px;
      background-image: url('RAID_server.png');
      background-size: cover;
      background-position: center;
    }
    .bay {
      position: absolute;
      width: 170px;
      height: 50px;
      border: 2px dashed rgba(0, 0, 0, 0.2);
      background-color: #ccc;
      opacity: 0.6;
      border-radius: 6px;
    }
    .replaced {
      background-color: #7cc77c !important;
      border: 2px solid #2e7d32 !important;
    }
    button {
      padding: 8px 16px;
      margin: 5px;
      background-color: #1a73e8;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background-color: #145cb3; }

    #feedback { font-weight: bold; margin-top: 10px; color: #333; }

    #dialog {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border: 2px solid #888;
      border-radius: 10px;
      padding: 20px;
      display: none;
      z-index: 999;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 90%;
      box-sizing: border-box;
      text-align: left;
      white-space: pre-wrap;
    }
    #dialog h3 { margin-top: 0; }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      z-index: 998;
    }

    @media (max-width: 600px) {
      body { padding: 10px; }
      #layout-container { gap: 15px; }
      .drive { width: 140px; font-size: 11px; }
      button { padding: 10px 18px; min-height: 40px; }
    }
  </style>
</head>
<body>
  <h2>RAID Troubleshooting Challenge</h2>
  <div class="instructions">
    Click each drive to review logs. Remove failed drives, then drag and drop matching spares.
  </div>

  <div id="feedback"></div>

  <div id="layout-container">
    <div id="spare-wrapper"></div>
    <div id="server-scroll">
      <div id="server-container"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="init()">Next Issue</button>
    <button onclick="submitChallenge()">Submit</button>
  </div>

  <div id="dialog">
    <h3>Drive Report</h3>
    <pre id="logContent"></pre>
    <button onclick="closeDialog()">Close</button>
  </div>
  <div id="overlay" onclick="closeDialog()"></div>

  <script>
    const speeds = ["400MB/s", "520MB/s", "550MB/s", "600MB/s"];
    const sizes = [1, 2, 4];
    const types = ["HDD", "SSD", "NVMe"];
    const manufacturers = ["Seagate", "Western Digital", "Toshiba", "Samsung", "Hitachi"];
    const raidLevels = [
      { name: "RAID 0", minDrives: 2 },
      { name: "RAID 1", minDrives: 2 },
      { name: "RAID 5", minDrives: 3 },
      { name: "RAID 10", minDrives: 4 }
    ];

    let failedDrives = [];
    let totalFailures = 0;
    let currentRaid = {};

    function timestamp() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function generateSerial() {
      return 'SN' + Math.floor(100 + Math.random() * 900) + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
    }

    function misleadingNote() {
      const notes = [
        "[Warning] Write latency high during peak load",
        "[Info] Passed last SMART scan",
        "[Info] Recovered from previous checksum error",
        "[Warning] Unexpected shutdown on previous boot"
      ];
      return notes[Math.floor(Math.random() * notes.length)];
    }

    function randomInstallDate() {
      const now = new Date();
      now.setFullYear(now.getFullYear() - Math.floor(Math.random() * 5 + 1));
      return now.toISOString().split('T')[0];
    }

    function calculateAge(installDate) {
      const now = new Date();
      const install = new Date(installDate);
      return `${Math.floor((now - install) / (1000 * 60 * 60 * 24 * 365))} years`;
    }

    function formatReport({manufacturer, serial, installDate, age, type, cap, spd, raid, isFailed, driveNum}) {
      const base = `Manufacturer: ${manufacturer}
Serial: ${serial}
Install Date: ${installDate}
Drive Age: ${age}

Drive Type: ${type}

Capacity: ${cap}TB
Speed: ${spd}
RAID Level: ${raid}`;

      if (isFailed) {
        return `${base}

[Critical] Drive ${driveNum} failed at ${timestamp()}
${misleadingNote()}`;
      } else {
        return `${base}

${misleadingNote()}`;
      }
    }

    function init() {
      document.getElementById("feedback").textContent = "";
      document.getElementById("spare-wrapper").innerHTML = "";
      document.getElementById("server-container").innerHTML = "";
      failedDrives = [];
      totalFailures = 0;

      currentRaid = raidLevels[Math.floor(Math.random() * raidLevels.length)];
      const bayCount = currentRaid.minDrives + Math.floor(Math.random() * 3) + 1;

      for (let i = 1; i <= bayCount; i++) {
        const cap = sizes[Math.floor(Math.random() * sizes.length)];
        const spd = speeds[Math.floor(Math.random() * speeds.length)];
        const type = types[Math.floor(Math.random() * types.length)];
        const serial = generateSerial();
        const installDate = randomInstallDate();
        const manufacturer = manufacturers[Math.floor(Math.random() * manufacturers.length)];
        const age = calculateAge(installDate);

        const bay = document.createElement("div");
        bay.className = "bay";
        bay.id = "bay" + i;
        bay.style.top = (90 + Math.floor((i - 1) / 2) * 90) + "px";
        bay.style.left = (i % 2 === 1 ? 80 : 320) + "px";

        const drive = document.createElement("div");
        drive.className = "drive";
        drive.innerHTML = `<span>Drive ${i}</span><span>${cap}TB</span><span>${spd}</span><div class="remove-btn" onclick="removeDrive(event, 'bay${i}')">✖</div>`;
        drive.dataset.capacity = cap;
        drive.dataset.speed = spd;
        drive.dataset.type = type;

        const isFailed = Math.random() < 0.35 && failedDrives.length < 2;

        drive.dataset.log = formatReport({
          manufacturer, serial, installDate, age, type, cap, spd,
          raid: currentRaid.name,
          isFailed,
          driveNum: i
        });

        if (isFailed) {
          failedDrives.push({ cap, spd, type });
          totalFailures++;
        }

        drive.onclick = e => {
          if (!e.target.classList.contains("remove-btn")) openDialog(drive.dataset.log);
        };

        bay.appendChild(drive);
        document.getElementById("server-container").appendChild(bay);

        bay.ondragover = e => e.preventDefault();
        bay.ondrop = function(e) {
          e.preventDefault();
          const id = e.dataTransfer.getData("text/plain");
          handleDropOnBay(bay, id);
        };
      }

      let allSpares = failedDrives.map(f => ({ cap: f.cap, spd: f.spd, type: f.type }));
      while (allSpares.length < 8) {
        const cap = sizes[Math.floor(Math.random() * sizes.length)];
        const spd = speeds[Math.floor(Math.random() * speeds.length)];
        const type = types[Math.floor(Math.random() * types.length)];
        allSpares.push({ cap, spd, type });
      }
      allSpares = allSpares.sort(() => Math.random() - 0.5);
      allSpares.forEach(s => addSpareDrive(s.cap, s.spd, s.type));
    }

    function handleDropOnBay(bay, spareId) {
      if (bay.children.length > 0) return;
      const spare = document.getElementById(spareId);
      if (!spare) return;
      const dCap = parseFloat(spare.dataset.capacity);
      const dSpd = spare.dataset.speed;
      const dType = spare.dataset.type;
      const match = failedDrives.find(f => f.cap == dCap && f.spd == dSpd && f.type == dType);
      if (match) {
        bay.appendChild(spare);
        bay.classList.add("replaced");
        failedDrives = failedDrives.filter(f => f !== match);
      } else {
        alert("❌ Incorrect replacement: specs do not match any failed drive!");
      }
    }

    let touchDraggedId = null;

    function addSpareDrive(cap, spd, type) {
      const id = "spare" + Math.random().toString(36).substring(7);
      const drive = document.createElement("div");
      drive.className = "drive";
      drive.id = id;
      drive.draggable = true;
      drive.dataset.capacity = cap;
      drive.dataset.speed = spd;
      drive.dataset.type = type;
      drive.innerHTML = `<span>Spare</span><span>${cap}TB</span><span>${spd}</span><span>${type}</span>`;
      drive.ondragstart = e => e.dataTransfer.setData("text/plain", id);

      // Touch support: native HTML5 drag-and-drop does not work on mobile
      // touch devices, so re-implement the same drop logic using touch events.
      drive.addEventListener("touchstart", e => {
        touchDraggedId = id;
      }, { passive: true });
      drive.addEventListener("touchmove", e => {
        e.preventDefault();
      }, { passive: false });
      drive.addEventListener("touchend", e => {
        if (!touchDraggedId) return;
        const touch = e.changedTouches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const bay = target ? target.closest(".bay") : null;
        if (bay) {
          handleDropOnBay(bay, touchDraggedId);
        }
        touchDraggedId = null;
      });

      document.getElementById("spare-wrapper").appendChild(drive);
    }

    function removeDrive(event, bayId) {
      event.stopPropagation();
      document.getElementById(bayId).innerHTML = "";
    }

    function submitChallenge() {
      const feedback = document.getElementById("feedback");

      if (totalFailures === 0) {
        feedback.textContent = "✅ Success! No failures occurred and no replacements were needed!";
      } else if (failedDrives.length === 0) {
        feedback.textContent = "✅ Success! All failed drives have been correctly replaced!";
      } else {
        feedback.textContent = "❌ Some failed drives have not been replaced correctly!";
      }
    }

    function openDialog(text) {
      document.getElementById("logContent").textContent = text;
      document.getElementById("overlay").style.display = "block";
      document.getElementById("dialog").style.display = "block";
    }

    function closeDialog() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("dialog").style.display = "none";
    }

    window.onload = init;
  </script>
</body>
</html>
