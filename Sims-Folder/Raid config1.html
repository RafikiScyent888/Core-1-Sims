<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAID Configuration Challenge</title>

<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #a9cfff; /* shy blue */
  margin: 0;
  padding: 20px;
  text-align: center;
}

h2 { color: #2a4d69; }

.instructions {
  color: #555;
  margin-bottom: 20px;
}

#layout-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 50px;
  align-items: flex-start;
  margin-bottom: 20px;
  background-color: red; /* layout container red */
  padding: 20px;
  box-sizing: border-box;
}

/* baby blue interpretation */
#layout-container::after {
  content: "";
  display: block;
  width: 100%;
  height: 0;
  background: #89CFF0; /* baby blue */
}

#drive-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  max-width: 220px;
  width: 100%;
  justify-content: center;
  border: 2px dashed #bbb;
  padding: 10px;
  min-height: 100px;
  box-sizing: border-box;
}

.drive {
  width: 170px;
  max-width: 100%;
  height: 55px;
  background: hotpink; /* bright pink */
  border: 2px solid #888;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 6px 10px;
  box-shadow: 0 0 6px rgba(0,0,0,0.3);
  font-size: 12px;
  font-weight: bold;
  color: #222;
  cursor: grab;
  touch-action: none;
  box-sizing: border-box;
}

#server-container {
  max-width: 500px;
  width: 100%;
  background: #0096FF; /* bright blue */
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  box-sizing: border-box;
}

.server-title {
  color: white;
  margin-bottom: 15px;
  font-weight: bold;
}

.bay-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* expanded */
  gap: 10px;
}

.bay {
  height: 50px;
  width: 100%;
  min-height: 40px;
  display: flex;
  align-itmes: center;
  border: 2px dashed rgba(255,255,255,0.4);
  background-color: limegreen; /* lime green */
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #000;
  font-size: 12px;
  box-sizing: border-box;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
}

button {
  padding: 8px 16px;
  min-height: 40px;
  background-color: #1a73e8;
  border: none;
  border-radius: 5px;
  color: white;
  font-size: 14px;
  cursor: pointer;
  box-sizing: border-box;
}

button:hover { background-color: #145cb3; }

#scoreboard, #customer-desc {
  font-weight: bold;
  margin-top: 15px;
  color: #333;
}

@media (max-width: 600px) {
  body {
    padding: 12px;
  }

  h2 {
    font-size: 20px;
  }

  #layout-container {
    gap: 20px;
    padding: 12px;
  }

  #server-container {
    padding: 12px;
  }

  .bay-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 420px) {
  .bay-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<h2>RAID Configuration Challenge</h2>
<div class="instructions">
Drag SSDs into the server bays to satisfy the customer's requirements.
</div>

<div id="customer-desc"></div>

<div id="layout-container">
  <div id="drive-wrapper"></div>

  <div id="server-container">
    <div class="server-title">SERVER DRIVE BAYS</div>
    <div class="bay-grid">
      <!-- 24 Bays -->
      <script>
        for (let i = 1; i <= 24; i++) {
          document.write(`<div class="bay" id="bay${i}">Bay ${i}</div>`);
        }
      </script>
    </div>
  </div>
</div>

<div class="controls">
  <button onclick="resetAll()">New Customer</button>
  <button onclick="submitConfiguration()">Submit Configuration</button>
</div>

<div id="scoreboard"></div>

<script>
const speeds = ["400MB/s", "550MB/s", "600MB/s"];
const sizes = [1, 2];

// Shared touch-drag state (used by the touchstart/touchmove/touchend
// handlers below, since native HTML5 drag-and-drop does not fire on
// mobile touch screens).
let touchDragEl = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

// Shared drop-handling logic used by both the mouse-based HTML5 "drop"
// event and the touch-based reimplementation.
function placeDriveInBay(bay, drive) {
  if (!bay || !drive) return;
  if (!bay.querySelector(".drive")) {
    bay.innerHTML = "";
    bay.appendChild(drive);
  }
}

function resetAll() {
  generateDrives();
  clearBays();
}

function generateDrives() {
  const wrapper = document.getElementById("drive-wrapper");
  wrapper.innerHTML = "";

  for (let i = 0; i < 20; i++) { /* 20 drives */
    const div = document.createElement("div");
    div.className = "drive";
    div.id = "drive" + i;
    div.draggable = true;

    const cap = sizes[Math.floor(Math.random() * sizes.length)];
    const spd = speeds[Math.floor(Math.random() * speeds.length)];

    div.dataset.capacity = cap;
    div.dataset.speed = spd;

    div.innerHTML = `SSD ${i+1}<br>${cap}TB<br>${spd}`;

    div.addEventListener("dragstart", e =>
      e.dataTransfer.setData("text/plain", div.id)
    );

    // Touch support: HTML5 drag-and-drop doesn't work on mobile, so
    // reimplement dragging with touch events, reusing placeDriveInBay().
    div.addEventListener("touchstart", e => {
      touchDragEl = div;
      const t = e.touches[0];
      const rect = div.getBoundingClientRect();
      touchOffsetX = t.clientX - rect.left;
      touchOffsetY = t.clientY - rect.top;
    }, { passive: true });

    div.addEventListener("touchmove", e => {
      if (!touchDragEl) return;
      e.preventDefault();
      const t = e.touches[0];
      touchDragEl.style.position = "fixed";
      touchDragEl.style.zIndex = "1000";
      touchDragEl.style.left = (t.clientX - touchOffsetX) + "px";
      touchDragEl.style.top = (t.clientY - touchOffsetY) + "px";
      touchDragEl.style.pointerEvents = "none";
    }, { passive: false });

    div.addEventListener("touchend", e => {
      if (!touchDragEl) return;
      const dragged = touchDragEl;
      const t = e.changedTouches[0];

      dragged.style.position = "";
      dragged.style.zIndex = "";
      dragged.style.left = "";
      dragged.style.top = "";
      dragged.style.pointerEvents = "";

      const dropTarget = document.elementFromPoint(t.clientX, t.clientY);
      const bay = dropTarget ? dropTarget.closest(".bay") : null;
      if (bay) {
        placeDriveInBay(bay, dragged);
      }
      touchDragEl = null;
    });

    wrapper.appendChild(div);
  }
}

function clearBays() {
  document.querySelectorAll(".bay").forEach(bay => {
    bay.innerHTML = bay.id.replace("bay","Bay ");
    bay.addEventListener("dragover", e => e.preventDefault());

    bay.addEventListener("drop", e => {
      e.preventDefault();
      const id = e.dataTransfer.getData("text/plain");
      const drive = document.getElementById(id);
      placeDriveInBay(bay, drive);
    });

    bay.addEventListener("click", () => {
      if (bay.firstChild && bay.firstChild.classList?.contains("drive")) {
        document.getElementById("drive-wrapper").appendChild(bay.firstChild);
        bay.innerHTML = bay.id.replace("bay","Bay ");
      }
    });
  });
}

function submitConfiguration() {
  const filled = Array.from(document.querySelectorAll(".bay"))
    .filter(b => b.querySelector(".drive"));

  document.getElementById("scoreboard").textContent =
    `You placed ${filled.length} drives.`;
}

window.onload = resetAll;
</script>

</body>
</html>
